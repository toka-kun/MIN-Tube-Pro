<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
  
    <title>Google Classroom</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #fff; }
        
    
        #nav {
            display: flex; gap: 10px; padding: 5px 10px;
            background: #f1f3f4; border-bottom: 1px solid #ccc;
            align-items: center; height: 40px;
        }
        input { flex: 1; padding: 5px; border: 1px solid #ddd; border-radius: 4px; }
        
      
        .panic { background: #d93025; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        
        iframe { width: 100%; height: calc(100% - 50px); border: none; }
    </style>
</head>
<body>

<div id="nav">
    <input type="text" id="urlInput" placeholder="URLを入力 (例: https://example.com)">
    <button onclick="loadSite()">開く</button>
    
    <button class="panic" onclick="panic()">緊急離脱 (Esc)</button>
</div>

<iframe id="viewFrame" src="about:blank"></iframe>

<script>
    const input = document.getElementById('urlInput');
    const frame = document.getElementById('viewFrame');

    // サイトを読み込む
    function loadSite() {
        let url = input.value.trim();
        if (!url.startsWith('http')) url = 'https://' + url;
        frame.src = url;
    }


    function panic() {
        window.location.href = 'https://www.google.com';
    }

  
    window.addEventListener('keydown', (e) => {
  
        if (e.key === 'Escape') panic();

        if (e.key === 'Enter') loadSite();
    });
</script>

</body>
</html>

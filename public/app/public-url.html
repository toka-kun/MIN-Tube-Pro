<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Domain List | MIN-Pro</title>
    <style>
        :root {
            --bg: #f9fafb;
            --surface: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --accent: #2563eb;
            --border: #e5e7eb;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text-main); font-family: var(--font);
            line-height: 1.5; -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 36px; font-weight: 800; color: var(--text-main); margin: 0 0 10px; letter-spacing: -0.025em; }
        p.subtitle { color: var(--text-sub); font-size: 16px; }

        .controls {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 40px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .search-box { position: relative; }
        .search-box input {
            width: 100%; background: #f3f4f6; border: 1px solid transparent; border-radius: 10px;
            padding: 12px 16px 12px 40px; font-size: 15px; transition: 0.2s;
        }
        .search-box input:focus { background: #fff; border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-sub); pointer-events: none; }

        .filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-chip {
            background: #f3f4f6; border: none; padding: 8px 16px; border-radius: 99px;
            font-size: 13px; font-weight: 600; color: var(--text-sub); cursor: pointer; transition: 0.2s;
        }
        .filter-chip.active { background: var(--text-main); color: #fff; }
        .filter-chip:hover:not(.active) { background: #e5e7eb; color: var(--text-main); }


        .domain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .domain-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between;
        }
        .domain-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: #d1d5db; }

        .domain-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .server-badge {
            font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 8px;
            border-radius: 4px; letter-spacing: 0.05em;
        }
        .badge-vercel { background: #000; color: #fff; }
        .badge-render { background: #46e3b7; color: #000; }
        .badge-unknown { background: #f3f4f6; color: var(--text-sub); }

        .domain-url { font-weight: 700; color: var(--text-main); text-decoration: none; word-break: break-all; margin-bottom: 8px; font-size: 15px; }
        .domain-url:hover { color: var(--accent); }
        .domain-meta { font-size: 12px; color: var(--text-sub); }

        .empty-state { text-align: center; padding: 60px 0; color: var(--text-sub); font-size: 15px; grid-column: 1 / -1; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Public Domains</h1>
        <p class="subtitle">MIN-Tube-Pro の公式・コミュニティ配布URL一覧</p>
    </header>

    <div class="controls">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="ドメインを検索...">
        </div>
        <div class="filters" id="filterContainer">
            <button class="filter-chip active" data-filter="all">すべて</button>
            <button class="filter-chip" data-filter="vercel">Vercel</button>
            <button class="filter-chip" data-filter="render">Render</button>
            <button class="filter-chip" data-filter="unknown">サーバー不明</button>
        </div>
    </div>

    <div class="domain-grid" id="domainGrid">
        <div class="empty-state">データを読み込み中...</div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPkgzCIOP3-ln0eX6043s2G3tyZu4uj18",
    authDomain: "message-site-d283b.firebaseapp.com",
    databaseURL: "https://message-site-d283b-default-rtdb.firebaseio.com",
    projectId: "message-site-d283b",
    storageBucket: "message-site-d283b.firebasestorage.app",
    messagingSenderId: "58182307350",
    appId: "1:58182307350:web:34a295f442ed2ce4ffaf37"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let allDomains = [];
  let currentFilter = 'all';

  async function fetchDomains() {
    const dbRef = ref(db);
    try {
        const snapshot = await get(child(dbRef, 'public_domains'));
        if (snapshot.exists()) {
            const data = snapshot.val();
            allDomains = Object.values(data).map(item => ({
                ...item,
                server: detectServer(item.url)
            }));
            renderList();
        } else {
            document.getElementById('domainGrid').innerHTML = '<div class="empty-state">登録されたドメインはありません。</div>';
        }
    } catch (e) {
        console.error(e);
        document.getElementById('domainGrid').innerHTML = '<div class="empty-state">エラーが発生しました。</div>';
    }
  }

  function detectServer(url) {
      if (url.includes('vercel.app')) return 'vercel';
      if (url.includes('onrender.com')) return 'render';
      return 'unknown';
  }

  function renderList() {
      const grid = document.getElementById('domainGrid');
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = allDomains.filter(d => {
          const matchSearch = d.url.toLowerCase().includes(search);
          const matchFilter = currentFilter === 'all' || d.server === currentFilter;
          return matchSearch && matchFilter;
      });

      if (filtered.length === 0) {
          grid.innerHTML = '<div class="empty-state">該当するドメインが見つかりません。</div>';
          return;
      }

      grid.innerHTML = filtered.map(d => `
          <div class="domain-card">
              <div class="domain-header">
                  <span class="server-badge badge-${d.server}">${d.server === 'unknown' ? '不明' : d.server}</span>
              </div>
              <a href="${d.url}" class="domain-url" target="_blank">${d.url.replace(/^https?:\/\//, '')}</a>
              <div class="domain-meta">登録: ${new Date(d.timestamp).toLocaleDateString()}</div>
          </div>
      `).join('');
  }

  document.getElementById('searchInput').addEventListener('input', renderList);
  document.getElementById('filterContainer').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-chip')) {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          e.target.classList.add('active');
          currentFilter = e.target.dataset.filter;
          renderList();
      }
  });

  fetchDomains();
</script>

</body>
</html>

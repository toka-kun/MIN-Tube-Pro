<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <style>
    body {
      background: #faf8ef;
      margin: 0;
      padding: 0;
    }

    canvas {
      border: 2px solid black;
      margin: 0 auto;
      display: block;
    }

    button {
      border-radius: 5px;
      font-size: 1.5em;
      display: block;
      margin: 10px auto;
    }
  </style>
</head>

<body>
  <canvas id="canvas" width="720" height="800"></canvas>
  <button onclick="gameManager.downBalls()">ボール落下</button>

  <script>
    function randomInt(...args) {
      if (args.length === 1) {
        const [n] = args;
        return Math.ceil(Math.random() * n);
      }

      if (args.length === 2) {
        const [start, end] = args;

        if (start > end) throw Error("開始値が終了値より大きいです");

        return Math.ceil(Math.random() * (end - start)) + start;
      }
    }

    function random(...args) {
      if (args.length === 1) {
        const [n] = args;
        return Math.random() * n;
      }

      if (args.length === 2) {
        const [start, end] = args;

        if (start > end) throw Error("開始値が終了値より大きいです");

        return Math.random() * (end - start) + start;
      }
    }

    const range = function (n, m) {
      if (arguments.length === 1)
        return Array.from({ length: n }).map((_, i) => i);

      if (arguments.length === 2) {
        if (n === m) return [n];
        else if (n < m) {
          return Array.from({ length: m - n + 1 }).map((_, i) => i + n);
        } else {
          return Array.from({ length: n - m + 1 }).map(
            (_, i) => m - i + (n - m)
          );
        }
      }
    };

    function normalize(n) {
      return n < 0 ? -1 : n > 0 ? 1 : 0;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function between(v, min, max) {
      return min <= v && v <= max;
    }

    const delay = (n) => new Promise((r) => setTimeout(r, n));
  </script>

  <script>
    class Vector {
      constructor(x = 0, y = 0) {
        this.x = x;
        this.y = y;
      }

      add(v) { this.x += v.x; this.y += v.y; }
      sub(v) { this.x -= v.x; this.y -= v.y; }
      mult(n) { this.x *= n; this.y *= n; }

      mag() {
        return Math.sqrt(this.x * this.x + this.y * this.y);
      }

      get() { return new Vector(this.x, this.y); }
      copy() { return new Vector(this.x, this.y); }
    }

    Vector.mult = (v, n) => new Vector(v.x * n, v.y * n);
    Vector.div = (v, n) => new Vector(v.x / n, v.y / n);
  </script>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const width = 710;
    const height = 880;
    const uiOffsetY = 80;

    canvas.width = width;
    canvas.height = height;

    function line(x1, y1, x2, y2, color = "#000") {
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function dashLine(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.setLineDash([5, 15]);
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function fillRect(x, y, w, h, color = "#171717") {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function circle(x, y, r, color = "#000") {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function clear() {
      ctx.clearRect(0, 0, width, height);
    }
  </script>

  <script>
    const POWER = 0.3;
    const Mouse = { position: new Vector(0, 0) };

    class Ball {
      constructor(x, y) {
        this.position = new Vector(x, y);
        this.velocity = new Vector(0, 0);
        this.r = 8;
      }

      shoot(target) {
        const angle = Math.atan2(
          target.y - this.position.y,
          target.x - this.position.x
        );

        this.velocity = new Vector(
          Math.cos(angle) * 8,
          Math.sin(angle) * 8
        );
      }

      update() {
        this.position.add(this.velocity);

        if (this.position.x < 0 || this.position.x > width)
          this.velocity.x *= -1;

        if (this.position.y < uiOffsetY)
          this.velocity.y *= -1;

        if (this.position.y > height - uiOffsetY) {
          this.velocity = new Vector(0, 0);
        }
      }

      display() {
        circle(this.position.x, this.position.y, this.r, "#5ba7f4");
      }
    }

    class UI {
      display(state) {
        ctx.fillStyle = "black";
        ctx.font = "16px Arial";
        ctx.fillText(`スコア: ${state.level}`, 20, 40);
        ctx.fillText(`ハイスコア: ${state.best}`, width - 160, 40);
      }

      gameOver() {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, height / 2 - 80, width, 160);
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("ゲームオーバー", width / 2 - 140, height / 2);
      }
    }

    class GameManager {
      constructor() {
        this.state = {
          level: 1,
          best: localStorage.getItem("best") || 1,
          over: false
        };

        this.ball = new Ball(width / 2, height - 100);
        this.ui = new UI();

        canvas.addEventListener("click", (e) => this.shoot(e));
      }

      shoot(e) {
        if (this.state.over) return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        this.ball.shoot({ x, y });
      }

      draw() {
        clear();
        this.ball.update();
        this.ball.display();
        this.ui.display(this.state);
      }

      run() {
        this.draw();

        if (this.state.over) {
          this.ui.gameOver();
          return;
        }

        requestAnimationFrame(() => this.run());
      }

      downBalls() {
        this.ball.velocity = new Vector(0, 10);
      }
    }

    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      Mouse.position = new Vector(
        e.clientX - rect.left,
        e.clientY - rect.top
      );
    });

    const gameManager = new GameManager();
    gameManager.run();
  </script>
</body>

</html>

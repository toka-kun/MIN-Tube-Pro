<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0"><title>1/2 survive</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--p:#3ecf8e;--d:#ff453a;--bg:#0d1117;--card:#161b22;--text:#c9d1d9}body{font-family:sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.container{background:var(--card);padding:2rem;border-radius:16px;text-align:center;width:90%;max-width:420px;border:1px solid#30363d}h1{font-size:1.6rem;color:var(--p);margin-bottom:0.5rem}.prob{font-size:2.4rem;font-weight:800;margin:20px 0;color:#fff}.screen{display:none}.active{display:block}button{background:var(--p);color:#000;border:none;padding:14px;border-radius:8px;cursor:pointer;width:100%;margin:8px 0;font-size:1.1rem;font-weight:bold}button.secondary{background:#30363d;color:var(--text);border:1px solid#484f58}button:disabled{background:#484f58;color:#8b949e}table{width:100%;margin-top:20px;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid#30363d;text-align:center}.rank-num{color:var(--p);font-weight:bold}input{width:100%;padding:14px;margin:16px 0;background:#0d1117;border:1px solid#30363d;color:white;border-radius:8px;text-align:center}</style></head><body><div class="container"><div id="screen-start"class="screen active"><h1>SURVIVAL 1/2</h1><button onclick="GAME.start()">ゲーム開始</button><button class="secondary"onclick="GAME.ranking()">ランキングを見る</button></div><div id="screen-game"class="screen"><div id="streak-count">SUCCESS:0</div><div class="prob"id="prob-display">1/1</div><div style="display:flex; gap:10px;"><button onclick="GAME.choice('left')">左</button><button onclick="GAME.choice('right')">右</button></div></div><div id="screen-result"class="screen"><h2 style="color:var(--d)">GAME OVER</h2><div id="final-stats"></div><div id="rank-in-section"style="display:none;"><p style="color:var(--p); font-weight:bold;">ランクイン！</p><input type="text"id="player-name"placeholder="名前を記入してください"maxlength="20"><button id="save-btn"onclick="GAME.save()">ランキングに登録</button></div><div id="result-back-title"style="display:none;"><button class="secondary"onclick="GAME.reset()">タイトルに戻る</button></div></div><div id="screen-ranking"class="screen"><h3>GLOBAL RANKING</h3><table id="ranking-table"></table><button class="secondary"style="margin-top:20px;"onclick="GAME.reset()">戻る</button></div></div><script>const GAME=(function(){const CONFIG={URL:"https://dpkctspxzyibymqfdivc.supabase.co",KEY:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwa2N0c3B4enlpYnltcWZkaXZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzgzMDEsImV4cCI6MjA5MjAxNDMwMX0.OWZ1SolevofFyt-udDzPUcaWlZgptH6oHn0KP9gKpJE",TABLE:"Ranking-nemmi"};const _supabase=supabase.createClient(CONFIG.URL,CONFIG.KEY);let streak=0;let startTime=0;let isSubmitting=false;let checkSum=0;function b(a){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+a).classList.add('active')}return{start:function(){streak=0;checkSum=0;startTime=Date.now();this.updateUI();b('game')},updateUI:function(){document.getElementById('streak-count').innerText=`SUCCESS: ${streak}`;let val=Math.pow(2,streak);document.getElementById('prob-display').innerText=`1 / ${val.toLocaleString()}`},choice:function(a){if(checkSum!==streak){alert("不正を検知しました。");this.reset();return}if(Math.random()<0.5){streak++;checkSum++;this.updateUI()}else{this.end()}},end:async function(){const playTimeSec=(Date.now()-startTime)/1000;const finalStats=document.getElementById('final-stats');finalStats.innerHTML=`${streak}回連続成功<br><small>Time: ${playTimeSec.toFixed(1)}s</small>`;b('result');if(streak>0&&(playTimeSec/streak)<0.3){finalStats.innerHTML+="<br><span style='color:red'>スピードが速すぎます（不正の疑い）</span>";document.getElementById('result-back-title').style.display='block';return}const{data}=await _supabase.from(CONFIG.TABLE).select('score').order('score',{ascending:false}).limit(10);const isTop=streak>0&&(!data||data.length<10||streak>data[data.length-1].score);if(isTop){document.getElementById('rank-in-section').style.display='block'}else{document.getElementById('result-back-title').style.display='block'}},save:async function(){if(isSubmitting)return;const name=document.getElementById('player-name').value.trim();if(!name)return alert("名前を入力してください");if(streak>60)return alert("異常なスコアです");isSubmitting=true;const btn=document.getElementById('save-btn');btn.disabled=true;btn.innerText="登録中...";const{error}=await _supabase.from(CONFIG.TABLE).insert([{name:name,score:streak}]);if(error){alert("保存に失敗");btn.disabled=false;isSubmitting=false}else{this.ranking()}},ranking:async function(){b('ranking');const table=document.getElementById('ranking-table');table.innerHTML="読み込み中...";const{data}=await _supabase.from(CONFIG.TABLE).select('*').order('score',{ascending:false}).limit(10);let html="<tr><th>RANK</th><th>NAME</th><th>SCORE</th></tr>";if(data){let rank=1;data.forEach((row,i)=>{if(i>0&&row.score<data[i-1].score)rank=i+1;const safeName=document.createElement('div');safeName.textContent=row.name;html+=`<tr><td class="rank-num">${rank}</td><td>${safeName.innerHTML}</td><td>${row.score}</td></tr>`})}table.innerHTML=html},reset:function(){streak=0;checkSum=0;isSubmitting=false;document.getElementById('rank-in-section').style.display='none';document.getElementById('result-back-title').style.display='none';document.getElementById('save-btn').disabled=false;document.getElementById('save-btn').innerText="ランキングに登録";b('start')}}})();</script></body></html>

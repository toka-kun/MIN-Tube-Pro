<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1/2 生存ゲーム (Supabase Online)</title>
    <!-- Supabaseライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #3ecf8e; --d: #ff453a; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--p); }
        .prob { font-size: 2.2rem; font-weight: bold; margin: 20px 0; color: #fff; text-shadow: 0 0 10px rgba(62, 207, 142, 0.3); }
        .screen { display: none; }
        .active { display: block; }
        button { background: var(--p); color: #000; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin: 8px 0; font-size: 1.1rem; font-weight: bold; transition: 0.2s; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button.secondary { background: #333; color: #ccc; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: center; }
        th { color: var(--p); font-size: 0.8rem; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 1rem; }
        .status { font-size: 0.9rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- スタート画面 -->
    <div id="screen-start" class="screen active">
        <h1>二分の一生存ゲーム</h1>
        <p>どこまで1/2を当て続けられるか？</p>
        <button onclick="startGame()">ゲーム開始</button>
        <button class="secondary" onclick="showRanking()">ランキングを見る</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="screen-game" class="screen">
        <div id="streak-count" style="color: #888;">0回成功</div>
        <div class="prob" id="prob-display">1/1</div>
        <p>次はどっち？</p>
        <div style="display:flex; gap:10px;">
            <button onclick="choice('left')">左</button>
            <button onclick="choice('right')">右</button>
        </div>
    </div>

    <!-- 結果画面 -->
    <div id="screen-result" class="screen">
        <h2 style="color:var(--d)">GAME OVER</h2>
        <div id="final-stats"></div>
        <div id="rank-in-msg" style="display:none;">
            <p style="color:var(--p); font-weight:bold; margin-top:20px;">ランクインしました！名前を入力してください</p>
            <input type="text" id="player-name" placeholder="なまえ" maxlength="10">
            <button onclick="saveScore()">ランキングに登録</button>
        </div>
        <button class="secondary" style="margin-top:20px;" onclick="location.reload()">タイトルへ戻る</button>
    </div>

    <!-- ランキング画面 -->
    <div id="screen-ranking" class="screen">
        <h3>世界TOP 10</h3>
        <table id="ranking-table"></table>
        <div id="loading" class="status">読み込み中...</div>
        <button class="secondary" style="margin-top:20px;" onclick="showScreen('start')">戻る</button>
    </div>
</div>

<script>
    // --- Supabase設定 ---
    const SUPABASE_URL = "https://dpkctspxzyibymqfdivc.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwa2N0c3B4enlpYnltcWZkaXZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzgzMDEsImV4cCI6MjA5MjAxNDMwMX0.OWZ1SolevofFyt-udDzPUcaWlZgptH6oHn0KP9gKpJE";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let streak = 0;
    let topScores = [];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
    }

    async function startGame() {
        streak = 0;
        updateUI();
        showScreen('game');
        // 事前にランキング情報を取得しておく
        fetchRankingData();
    }

    function updateUI() {
        document.getElementById('streak-count').innerText = `${streak}回成功`;
        let val = Math.pow(2, streak);
        let displayVal = val > 1e12 ? val.toExponential(2) : val.toLocaleString();
        document.getElementById('prob-display').innerText = `1 / ${displayVal}`;
    }

    function choice(userChoice) {
        const win = Math.random() < 0.5;
        if (win) {
            streak++;
            updateUI();
        } else {
            endGame();
        }
    }

    async function endGame() {
        let val = Math.pow(2, streak);
        let displayVal = val > 1e12 ? val.toExponential(2) : val.toLocaleString();
        document.getElementById('final-stats').innerHTML = `<h3>${streak}回連続成功！</h3><p>到達確率: 1/${displayVal}</p>`;
        
        // ランキング圏内か確認
        const isTop = topScores.length < 10 || streak > (topScores[topScores.length-1]?.score || 0);
        if (streak > 0 && isTop) {
            document.getElementById('rank-in-msg').style.display = 'block';
        } else {
            document.getElementById('rank-in-msg').style.display = 'none';
        }
        
        showScreen('result');
    }

    async function fetchRankingData() {
        const { data, error } = await _supabase
            .from('ranking')
            .select('name, score')
            .order('score', { ascending: false })
            .limit(10);
        
        if (!error) topScores = data;
        return data;
    }

    async function saveScore() {
        const name = document.getElementById('player-name').value.trim() || "名無し";
        const { error } = await _supabase
            .from('ranking')
            .insert([{ name: name, score: streak }]);
        
        if (error) {
            alert("保存に失敗しました。RLS設定を確認してください。");
        } else {
            showRanking();
        }
    }

    async function showRanking() {
        showScreen('ranking');
        const table = document.getElementById('ranking-table');
        const loading = document.getElementById('loading');
        
        table.innerHTML = "";
        loading.style.display = "block";

        const data = await fetchRankingData();
        loading.style.display = "none";

        if (data && data.length > 0) {
            let html = "<tr><th>順位</th><th>名前</th><th>成功回数</th></tr>";
            data.forEach((row, i) => {
                html += `<tr><td>${i+1}</td><td>${escapeHtml(row.name)}</td><td>${row.score}</td></tr>`;
            });
            table.innerHTML = html;
        } else {
            table.innerHTML = "<tr><td>データがありません</td></tr>";
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    // 初回読み込み時にランキングを取得しておく
    fetchRankingData();
</script>

</body>
</html>

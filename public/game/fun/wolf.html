<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Werewolf with Tasks</title>
    <style>
        :root {
            --bg-base: #0a0a0f;
            --bg-surface: #12131c;
            --bg-panel: rgba(20, 22, 33, 0.85);
            --blood-red: #d91627;
            --blood-dark: #8b0000;
            --text-main: #e2e2e5;
            --text-muted: #7b7e8c;
            --accent-cyan: #39ff14; /* For system/tasks */
            --accent-gold: #ffd700;
            --border-dim: #2a2c3d;
            --font-heading: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --shadow-glow: 0 0 15px rgba(217, 22, 39, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            /* Subtle noise texture via base64 for atmosphere */
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
        }

        h1, h2, h3 { font-family: var(--font-heading); font-weight: normal; letter-spacing: 2px; }

        .hidden { display: none !important; }

        /* --- Buttons & Inputs --- */
        input[type="text"] {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-dim);
            color: var(--text-main);
            padding: 12px 20px;
            font-size: 1rem;
            outline: none;
            width: 100%;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus { border-color: var(--blood-red); box-shadow: var(--shadow-glow); }

        button {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--blood-red);
            padding: 12px 24px;
            font-family: var(--font-heading);
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        button:hover:not(:disabled) {
            background: var(--blood-dark);
            box-shadow: var(--shadow-glow);
        }
        button:disabled { border-color: var(--border-dim); color: var(--text-muted); cursor: not-allowed; }

        .btn-action { padding: 6px 12px; font-size: 0.8rem; border-color: var(--accent-cyan); }
        .btn-action:hover:not(:disabled) { background: rgba(57, 255, 20, 0.2); }
        .btn-attack { border-color: var(--blood-red); }
        .btn-attack:hover:not(:disabled) { background: var(--blood-red); }

        /* --- Screens Layout --- */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.8s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Top Screen --- */
        #top-screen { align-items: center; justify-content: center; text-align: center; }
        .title-glitch { font-size: 3.5rem; color: var(--blood-red); margin-bottom: 2rem; text-shadow: 2px 2px 0 #000; }
        .login-box { background: var(--bg-surface); padding: 3rem; border: 1px solid var(--border-dim); max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- Lobby & Waiting Room --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; width: 100%; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-dim); padding-bottom: 1rem; margin-bottom: 2rem; }
        .list-container { display: grid; gap: 1rem; }
        .list-item { background: var(--bg-panel); border-left: 4px solid var(--border-dim); padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .list-item:hover { border-left-color: var(--blood-red); background: #1a1c29; }

        /* --- Game Screen (3 Panes) --- */
        #game-screen .game-layout {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 1rem;
            padding: 1rem;
            height: 100vh;
        }
        @media (max-width: 900px) {
            #game-screen .game-layout { grid-template-columns: 1fr; grid-template-rows: auto auto 400px; height: auto; }
        }

        .pane { background: var(--bg-panel); border: 1px solid var(--border-dim); display: flex; flex-direction: column; overflow: hidden; }
        .pane-header { background: var(--bg-surface); padding: 1rem; font-family: var(--font-heading); border-bottom: 1px solid var(--border-dim); text-align: center; letter-spacing: 1px; }
        .pane-content { padding: 1rem; overflow-y: auto; flex: 1; }

        /* Info Pane */
        .phase-indicator { font-size: 1.5rem; text-align: center; color: var(--accent-gold); margin-bottom: 1rem; }
        .timer { font-size: 2.5rem; text-align: center; margin-bottom: 2rem; font-family: monospace; color: var(--text-main); }
        .my-role { font-size: 1.2rem; text-align: center; padding: 1rem; border: 1px dashed var(--border-dim); color: var(--blood-red); margin-bottom: 2rem; }
        
        /* Task System */
        .task-box { border: 1px solid var(--accent-cyan); padding: 1rem; margin-top: 1rem; }
        .task-title { color: var(--accent-cyan); font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase; }
        .task-progress { background: #000; height: 10px; width: 100%; margin-top: 10px; }
        .task-bar { background: var(--accent-cyan); height: 100%; width: 0%; transition: width 0.3s; }
        .hint-text { color: var(--accent-gold); font-style: italic; margin-top: 1rem; border-left: 2px solid var(--accent-gold); padding-left: 10px; }

        /* Players Pane */
        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .player-card { background: var(--bg-surface); padding: 1rem; border: 1px solid var(--border-dim); display: flex; flex-direction: column; align-items: center; position: relative; }
        .player-card.dead { opacity: 0.5; filter: grayscale(100%); text-decoration: line-through; border-color: #000; }
        .player-card.dead::after { content: 'DEAD'; position: absolute; color: var(--blood-red); font-weight: bold; font-size: 2rem; transform: rotate(-20deg); opacity: 0.7; }
        .action-area { margin-top: 10px; min-height: 35px; }

        /* Chat Pane */
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
        .msg { padding: 8px; border-radius: 4px; background: rgba(0,0,0,0.3); word-break: break-all; }
        .msg.system { color: var(--accent-gold); font-style: italic; background: rgba(255, 215, 0, 0.1); border-left: 3px solid var(--accent-gold); }
        .msg.werewolf { color: #ff4d4d; background: rgba(255, 0, 0, 0.1); border-left: 3px solid var(--blood-red); }
        .msg.dead { color: #aaa; background: rgba(255, 255, 255, 0.05); border-left: 3px solid #555; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { flex: 1; }

        /* Result Screen */
        #result-screen { justify-content: center; align-items: center; text-align: center; }
        .win-text { font-size: 4rem; color: var(--accent-gold); text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); margin-bottom: 2rem; }
        .win-text.werewolf-win { color: var(--blood-red); text-shadow: 0 0 20px rgba(217, 22, 39, 0.5); }
        .result-list { max-width: 600px; width: 100%; margin: 0 auto 2rem; text-align: left; }

        /* Utilities */
        .status-badge { padding: 4px 8px; font-size: 0.75rem; background: var(--bg-surface); border: 1px solid var(--border-dim); }
    </style>
</head>
<body>

    <div id="top-screen" class="screen">
        <div class="login-box">
            <h1 class="title-glitch">WEREWOLF<br><span style="font-size: 1.5rem; color:var(--text-muted)">with tasks</span></h1>
            <input type="text" id="player-name-input" placeholder="Enter your name..." maxlength="15">
            <button id="btn-login" style="margin-top: 1.5rem; width: 100%;">Enter Lobby</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen hidden">
        <div class="container">
            <div class="header-bar">
                <h2>Lobby</h2>
                <button id="btn-create-room">Create Room</button>
            </div>
            <div class="list-container" id="room-list">
                </div>
        </div>
    </div>

    <div id="waiting-room-screen" class="screen hidden">
        <div class="container">
            <div class="header-bar">
                <h2 id="waiting-room-name">Room Name</h2>
                <div>
                    <button id="btn-leave-room" style="border-color: var(--text-muted); margin-right: 10px;">Leave</button>
                    <button id="btn-start-game" class="hidden">Start Game</button>
                    <span id="waiting-host-msg" class="text-muted">Waiting for host...</span>
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 300px; gap: 2rem;">
                <div>
                    <h3>Players (<span id="player-count">0</span>/8)</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">* 4 players minimum required</p>
                    <div class="list-container" id="waiting-player-list">
                        </div>
                </div>
                <div class="pane">
                    <div class="pane-header">Lobby Chat</div>
                    <div class="pane-content chat-messages" id="waiting-chat-messages"></div>
                    <form class="chat-input-area" id="waiting-chat-form" style="padding: 10px; border-top: 1px solid var(--border-dim)">
                        <input type="text" id="waiting-chat-input" placeholder="Message..." autocomplete="off">
                        <button type="submit" style="padding: 10px;">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="game-layout">
            <div class="pane">
                <div class="pane-header">Status</div>
                <div class="pane-content">
                    <div class="phase-indicator" id="ui-phase-name">NIGHT</div>
                    <div class="timer" id="ui-timer">00</div>
                    <div class="my-role" id="ui-my-role">Role: ???</div>
                    
                    <div class="task-box">
                        <div class="task-title">Current Task</div>
                        <div id="task-desc" style="font-size: 0.9rem; margin-bottom: 10px;">Standby...</div>
                        <div id="task-interaction-area">
                            </div>
                        <div class="task-progress">
                            <div class="task-bar" id="ui-task-bar"></div>
                        </div>
                        <div id="ui-hint-area" class="hint-text hidden"></div>
                    </div>
                </div>
            </div>

            <div class="pane">
                <div class="pane-header">Citizens</div>
                <div class="pane-content">
                    <div class="player-grid" id="game-player-grid">
                        </div>
                </div>
            </div>

            <div class="pane">
                <div class="pane-header" id="ui-chat-header">Global Chat</div>
                <div class="pane-content chat-messages" id="game-chat-messages"></div>
                <form class="chat-input-area" id="game-chat-form" style="padding: 10px; border-top: 1px solid var(--border-dim)">
                    <input type="text" id="game-chat-input" placeholder="Type message..." autocomplete="off">
                    <button type="submit" style="padding: 10px;">Send</button>
                </form>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen hidden">
        <div class="container">
            <h1 class="win-text" id="result-winner">VILLAGERS WIN</h1>
            <div class="list-container result-list" id="result-player-list">
                </div>
            <button id="btn-back-lobby" style="margin-top: 2rem;">Return to Lobby</button>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, push, remove, onDisconnect, get, child, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        // --- 1. Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyBNcP1T_ar7NHipLLSfj0evosL1xOFTFGw",
            authDomain: "gitcat-b8f92.firebaseapp.com",
            databaseURL: "https://gitcat-b8f92-default-rtdb.firebaseio.com",
            projectId: "gitcat-b8f92",
            storageBucket: "gitcat-b8f92.firebasestorage.app",
            messagingSenderId: "740581338729",
            appId: "1:740581338729:web:0e7b34f0244a5e3ac37cf8",
            measurementId: "G-3T9LY7M5LJ"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 2. Global State ---
        let me = { id: '', name: '', role: '', isAlive: true };
        let room = { id: null, isHost: false, status: 'waiting', phase: '', timerEnd: 0 };
        let playersData = {};
        let gameStateData = {};
        let tasksData = {};
        let unsubscribes = []; // To clear listeners on room leave
        let hostLoopInterval = null;
        let myDisconnectRef = null;
        let currentTaskAnswer = null;

        const ROLES = {
            villager: { name: 'Villager', team: 'villager', label: '村人' },
            seer: { name: 'Seer', team: 'villager', label: '占い師' },
            knight: { name: 'Knight', team: 'villager', label: '騎士' },
            werewolf: { name: 'Werewolf', team: 'werewolf', label: '人狼' },
            madman: { name: 'Madman', team: 'werewolf', label: '狂人' }
        };
        const PHASE_TIME = { night: 40000, day: 120000, voting: 30000 };

        // --- 3. DOM Elements ---
        const screens = {
            top: document.getElementById('top-screen'),
            lobby: document.getElementById('lobby-screen'),
            waiting: document.getElementById('waiting-room-screen'),
            game: document.getElementById('game-screen'),
            result: document.getElementById('result-screen')
        };

        // --- 4. Core Utilities ---
        const generateId = () => 'usr_' + Math.random().toString(36).substr(2, 9);
        const switchScreen = (screenName) => {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        };
        const escapeHTML = (str) => str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        const clearListeners = () => { unsubscribes.forEach(u => u()); unsubscribes = []; };

        // --- 5. Initialization (Top Screen) ---
        const initUser = () => {
            let savedId = localStorage.getItem('ww_playerId');
            let savedName = localStorage.getItem('ww_playerName');
            if (!savedId) { savedId = generateId(); localStorage.setItem('ww_playerId', savedId); }
            me.id = savedId;
            if (savedName) document.getElementById('player-name-input').value = savedName;
        };

        document.getElementById('btn-login').addEventListener('click', () => {
            const nameInput = document.getElementById('player-name-input').value.trim();
            if (!nameInput) return alert("名前を入力してください。");
            me.name = nameInput;
            localStorage.setItem('ww_playerName', me.name);
            switchScreen('lobby');
            subscribeLobby();
        });

        // --- 6. Lobby Logic ---
        const subscribeLobby = () => {
            const roomsRef = ref(db, 'rooms');
            const unsub = onValue(roomsRef, (snapshot) => {
                const data = snapshot.val() || {};
                const listEl = document.getElementById('room-list');
                listEl.innerHTML = '';
                Object.entries(data).forEach(([rId, rData]) => {
                    if (rData.info && rData.info.status === 'waiting') {
                        const pCount = rData.players ? Object.keys(rData.players).length : 0;
                        const div = document.createElement('div');
                        div.className = 'list-item';
                        div.innerHTML = `
                            <div>
                                <h3 style="margin-bottom:5px;">${escapeHTML(rData.info.name)}</h3>
                                <span class="status-badge">Players: ${pCount} / 8</span>
                            </div>
                            <button onclick="window.joinRoom('${rId}')" ${pCount >= 8 ? 'disabled' : ''}>JOIN</button>
                        `;
                        listEl.appendChild(div);
                    }
                });
            });
            unsubscribes.push(unsub);
        };

        document.getElementById('btn-create-room').addEventListener('click', async () => {
            const roomName = prompt("ルーム名を入力してください:", `${me.name}の部屋`);
            if (!roomName) return;
            const newRoomId = 'rm_' + Math.random().toString(36).substr(2, 9);
            room.id = newRoomId;
            room.isHost = true;
            await set(ref(db, `rooms/${newRoomId}/info`), { name: roomName, hostId: me.id, status: 'waiting' });
            joinRoom(newRoomId);
        });

        // Make globally accessible for inline onclick
        window.joinRoom = async (roomId) => {
            clearListeners();
            room.id = roomId;
            const playerRef = ref(db, `rooms/${roomId}/players/${me.id}`);
            
            // Set disconnect handler to remove player if they close tab in waiting room
            myDisconnectRef = onDisconnect(playerRef);
            await myDisconnectRef.remove();
            
            await set(playerRef, { name: me.name, isAlive: true, role: '' });
            switchScreen('waiting');
            subscribeWaitingRoom();
        };

        // --- 7. Waiting Room Logic ---
        const subscribeWaitingRoom = () => {
            const roomRef = ref(db, `rooms/${room.id}`);
            const unsub = onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return handleRoomClosed();

                room.isHost = data.info.hostId === me.id;
                document.getElementById('waiting-room-name').innerText = data.info.name;
                
                // Update players
                playersData = data.players || {};
                const pKeys = Object.keys(playersData);
                document.getElementById('player-count').innerText = pKeys.length;
                
                const pList = document.getElementById('waiting-player-list');
                pList.innerHTML = '';
                pKeys.forEach(pid => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.style.padding = '0.5rem 1rem';
                    div.innerHTML = `<span>${escapeHTML(playersData[pid].name)} ${data.info.hostId === pid ? '<span style="color:var(--accent-gold)">[HOST]</span>' : ''}</span>`;
                    pList.appendChild(div);
                });

                // Host UI
                document.getElementById('btn-start-game').classList.toggle('hidden', !room.isHost);
                document.getElementById('waiting-host-msg').classList.toggle('hidden', room.isHost);
                document.getElementById('btn-start-game').disabled = pKeys.length < 4;

                // Status Check
                if (data.info.status === 'playing') {
                    transitionToGame();
                }
            });
            unsubscribes.push(unsub);
            subscribeChat('waiting');
        };

        const handleRoomClosed = () => {
            clearListeners();
            alert("ルームが解散されたか、存在しません。");
            switchScreen('lobby');
            subscribeLobby();
        };

        document.getElementById('btn-leave-room').addEventListener('click', async () => {
            if(myDisconnectRef) myDisconnectRef.cancel();
            await remove(ref(db, `rooms/${room.id}/players/${me.id}`));
            if(room.isHost) await remove(ref(db, `rooms/${room.id}`)); // Simple host leave logic
            clearListeners();
            switchScreen('lobby');
            subscribeLobby();
        });

        document.getElementById('btn-start-game').addEventListener('click', async () => {
            if (!room.isHost) return;
            const pKeys = Object.keys(playersData);
            if (pKeys.length < 4) return;

            // Role Distribution Algorithm
            const deck = [];
            deck.push('werewolf');
            deck.push('seer');
            if (pKeys.length >= 5) deck.push('knight');
            if (pKeys.length >= 6) deck.push('werewolf'); // 2nd WW
            if (pKeys.length >= 7) deck.push('madman');
            while (deck.length < pKeys.length) deck.push('villager');
            
            // Shuffle
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }

            const updates = {};
            pKeys.forEach((pid, idx) => { updates[`rooms/${room.id}/players/${pid}/role`] = deck[idx]; });
            updates[`rooms/${room.id}/info/status`] = 'playing';
            updates[`rooms/${room.id}/gameState`] = { phase: 'night', dayCount: 1, timerEndTime: Date.now() + PHASE_TIME.night, votes: {}, nightActions: {} };
            
            await update(ref(db), updates);
            sysChat("ゲームが開始されました。最初は夜のフェーズです。");
        });

        // --- 8. Core Game Logic (Client & Host) ---
        const transitionToGame = () => {
            clearListeners(); // Clear waiting room listeners
            switchScreen('game');

            // Setup new disconnect behavior: just mark dead
            if(myDisconnectRef) myDisconnectRef.cancel();
            myDisconnectRef = onDisconnect(ref(db, `rooms/${room.id}/players/${me.id}`));
            myDisconnectRef.update({ isAlive: false });

            // Subscribe to game state
            const roomRef = ref(db, `rooms/${room.id}`);
            const unsub = onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return handleRoomClosed();
                
                playersData = data.players || {};
                gameStateData = data.gameState || {};
                tasksData = data.tasks || {};

                me.role = playersData[me.id]?.role;
                me.isAlive = playersData[me.id]?.isAlive;
                room.phase = gameStateData.phase;

                renderGameUI();
                
                if (data.info.status === 'finished') {
                    showResultScreen(data.gameState.winner);
                }
            });
            unsubscribes.push(unsub);
            subscribeChat('game');
            generateTask(); // Start first task

            if (room.isHost) startHostLoop();

            // Local Timer Loop for UI
            setInterval(() => {
                if (room.status === 'finished' || !gameStateData.timerEndTime) return;
                const remaining = Math.max(0, Math.floor((gameStateData.timerEndTime - Date.now()) / 1000));
                document.getElementById('ui-timer').innerText = remaining.toString().padStart(2, '0');
            }, 500);
        };

        const renderGameUI = () => {
            // Update Info
            document.getElementById('ui-phase-name').innerText = `DAY ${gameStateData.dayCount || 1} - ${room.phase.toUpperCase()}`;
            document.getElementById('ui-my-role').innerText = `Role: ${ROLES[me.role]?.label || '???'} ${me.isAlive ? '' : '(DEAD)'}`;
            
            // Adjust chat header based on phase/role
            const chatHeader = document.getElementById('ui-chat-header');
            if (!me.isAlive) chatHeader.innerText = "霊界チャット (Dead)";
            else if (room.phase === 'night' && me.role === 'werewolf') chatHeader.innerText = "人狼チャット (Werewolves)";
            else chatHeader.innerText = "公開チャット (Public)";

            // Update Task UI
            const myTask = tasksData[me.id] || { completedCount: 0, isHintUnlocked: false };
            document.getElementById('ui-task-bar').style.width = `${Math.min(100, (myTask.completedCount / 3) * 100)}%`;
            if (myTask.isHintUnlocked) {
                const hintEl = document.getElementById('ui-hint-area');
                if (hintEl.classList.contains('hidden')) {
                    hintEl.classList.remove('hidden');
                    hintEl.innerText = generateRandomHint();
                }
            }

            // Render Players and Actions
            const grid = document.getElementById('game-player-grid');
            grid.innerHTML = '';
            Object.entries(playersData).forEach(([pid, pData]) => {
                const card = document.createElement('div');
                card.className = `player-card ${pData.isAlive ? '' : 'dead'}`;
                
                let roleDisplay = '';
                // Show roles to self, or dead players, or werewolf to other werewolves
                if (pid === me.id || !me.isAlive || (me.role === 'werewolf' && pData.role === 'werewolf')) {
                    roleDisplay = `<span style="font-size: 0.8rem; color: var(--accent-gold)">[${ROLES[pData.role]?.label || ''}]</span>`;
                }

                let actionHtml = '';
                if (me.isAlive && pData.isAlive && pid !== me.id) {
                    if (room.phase === 'night') {
                        if (me.role === 'werewolf') actionHtml = `<button class="btn-action btn-attack" onclick="window.sendAction('werewolf_target', '${pid}')">襲撃 (Attack)</button>`;
                        else if (me.role === 'seer') actionHtml = `<button class="btn-action" onclick="window.sendAction('seer_target', '${pid}')">占う (Divine)</button>`;
                        else if (me.role === 'knight') actionHtml = `<button class="btn-action" onclick="window.sendAction('guard_target', '${pid}')">護衛 (Guard)</button>`;
                    } else if (room.phase === 'voting') {
                        actionHtml = `<button class="btn-action" onclick="window.sendAction('vote', '${pid}')">投票 (Vote)</button>`;
                    }
                }
                // Show if currently targeted/voted by ME
                let targetText = '';
                if (room.phase === 'night' && gameStateData.nightActions) {
                    if (me.role === 'werewolf' && gameStateData.nightActions.werewolf_target === pid) targetText = '<br><span style="color:var(--blood-red);font-size:0.8rem">⚠️襲撃対象</span>';
                    if (me.role === 'seer' && gameStateData.nightActions.seer_target === pid) targetText = '<br><span style="color:var(--accent-cyan);font-size:0.8rem">👁️占い対象</span>';
                    if (me.role === 'knight' && gameStateData.nightActions.guard_target === pid) targetText = '<br><span style="color:var(--accent-gold);font-size:0.8rem">🛡️護衛対象</span>';
                }
                if (room.phase === 'voting' && gameStateData.votes && gameStateData.votes[me.id] === pid) {
                    targetText = '<br><span style="color:var(--blood-red);font-size:0.8rem">🗳️投票済</span>';
                }

                card.innerHTML = `
                    <div style="font-weight: bold; font-size: 1.1rem; margin-bottom: 5px;">${escapeHTML(pData.name)}</div>
                    ${roleDisplay}
                    <div class="action-area">${actionHtml}${targetText}</div>
                `;
                grid.appendChild(card);
            });
        };

        window.sendAction = async (type, targetId) => {
            if (type === 'vote') {
                await update(ref(db, `rooms/${room.id}/gameState/votes`), { [me.id]: targetId });
            } else {
                await update(ref(db, `rooms/${room.id}/gameState/nightActions`), { [type]: targetId });
            }
        };

        // --- 9. Host Processing Loop ---
        const startHostLoop = () => {
            if (hostLoopInterval) clearInterval(hostLoopInterval);
            hostLoopInterval = setInterval(async () => {
                if (room.status === 'finished') return clearInterval(hostLoopInterval);
                
                // Fetch latest state directly to avoid race conditions
                const snap = await get(ref(db, `rooms/${room.id}/gameState`));
                const state = snap.val();
                if (!state || Date.now() < state.timerEndTime) return;

                // Time is up, process transition
                if (state.phase === 'night') await processNight(state);
                else if (state.phase === 'day') await processDay(state);
                else if (state.phase === 'voting') await processVoting(state);

            }, 1000);
        };

        const processNight = async (state) => {
            let updates = {};
            let killedId = null;
            const actions = state.nightActions || {};
            
            // Resolve Attack
            if (actions.werewolf_target && actions.werewolf_target !== actions.guard_target) {
                killedId = actions.werewolf_target;
                updates[`rooms/${room.id}/players/${killedId}/isAlive`] = false;
            }

            // Resolve Seer
            if (actions.seer_target) {
                const targetRole = playersData[actions.seer_target].role;
                const isWolf = (targetRole === 'werewolf'); // Madman appears as human
                sysChat(`【占い結果】${playersData[actions.seer_target].name} は ${isWolf ? '人狼です' : '人狼ではありません'}。`, 'dead'); // Hack: Send specifically to seer by filtering isn't easy natively without rules, so we'll push a local msg or system msg. For simplicity in this architecture, we push a system msg and the client filters it, OR we just trust the client.
                // Wait, DB chats broadcast to all. Let's make a specific "seer" type message.
                await push(ref(db, `rooms/${room.id}/chats`), { type: 'seer_result', target: actions.seer_target, isWolf: isWolf, seerId: getSeerId() });
            }

            // Next phase: Day
            updates[`rooms/${room.id}/gameState/phase`] = 'day';
            updates[`rooms/${room.id}/gameState/timerEndTime`] = Date.now() + PHASE_TIME.day;
            updates[`rooms/${room.id}/gameState/nightActions`] = null;
            await update(ref(db), updates);

            sysChat(`夜が明けました。${killedId ? playersData[killedId].name + 'が無惨な姿で発見されました...' : '昨晩は誰も死にませんでした。'}`);
            checkWinCondition();
        };

        const processDay = async (state) => {
            sysChat("議論の時間が終了しました。投票フェーズに移ります。");
            await update(ref(db, `rooms/${room.id}/gameState`), {
                phase: 'voting',
                timerEndTime: Date.now() + PHASE_TIME.voting,
                votes: null
            });
        };

        const processVoting = async (state) => {
            const votes = state.votes || {};
            const tallies = {};
            Object.values(votes).forEach(vid => { tallies[vid] = (tallies[vid] || 0) + 1; });
            
            let maxVotes = 0;
            let execId = null;
            let isTie = false;
            
            Object.entries(tallies).forEach(([vid, count]) => {
                if (count > maxVotes) { maxVotes = count; execId = vid; isTie = false; }
                else if (count === maxVotes) { isTie = true; }
            });

            let updates = {};
            if (execId && !isTie) {
                updates[`rooms/${room.id}/players/${execId}/isAlive`] = false;
                sysChat(`投票の結果、${playersData[execId].name} が処刑されました。`);
            } else {
                sysChat(`投票が同数、または投票がなかったため、本日の処刑は見送られました。`);
            }

            // Next Phase: Night
            updates[`rooms/${room.id}/gameState/phase`] = 'night';
            updates[`rooms/${room.id}/gameState/dayCount`] = (state.dayCount || 1) + 1;
            updates[`rooms/${room.id}/gameState/timerEndTime`] = Date.now() + PHASE_TIME.night;
            updates[`rooms/${room.id}/gameState/votes`] = null;
            
            await update(ref(db), updates);
            sysChat("恐ろしい夜がやってきました...");
            checkWinCondition();
        };

        const checkWinCondition = async () => {
            // Need latest players data
            const snap = await get(ref(db, `rooms/${room.id}/players`));
            const p = snap.val() || {};
            let wolves = 0; let humans = 0;
            Object.values(p).forEach(player => {
                if (player.isAlive) {
                    if (player.role === 'werewolf') wolves++;
                    else humans++;
                }
            });

            if (wolves === 0) {
                await update(ref(db, `rooms/${room.id}/info`), { status: 'finished' });
                await update(ref(db, `rooms/${room.id}/gameState`), { winner: 'villager' });
            } else if (wolves >= humans) {
                await update(ref(db, `rooms/${room.id}/info`), { status: 'finished' });
                await update(ref(db, `rooms/${room.id}/gameState`), { winner: 'werewolf' });
            }
        };

        const getSeerId = () => {
            const seer = Object.entries(playersData).find(([_, p]) => p.role === 'seer');
            return seer ? seer[0] : null;
        };

        // --- 10. Chat System ---
        const sysChat = async (text) => {
            if (!room.isHost) return;
            await push(ref(db, `rooms/${room.id}/chats`), { type: 'system', text: text, timestamp: Date.now() });
        };

        const subscribeChat = (mode) => {
            const chatRef = ref(db, `rooms/${room.id}/chats`);
            const container = mode === 'waiting' ? document.getElementById('waiting-chat-messages') : document.getElementById('game-chat-messages');
            container.innerHTML = ''; // clear
            
            const unsub = onValue(chatRef, (snapshot) => {
                container.innerHTML = '';
                const data = snapshot.val() || {};
                Object.values(data).sort((a,b)=>a.timestamp - b.timestamp).forEach(msg => {
                    // Filter Logic
                    if (mode === 'game') {
                        if (msg.type === 'seer_result') {
                            if (me.id !== msg.seerId && me.isAlive) return; // Only seer or dead can see
                            msg.text = `【占い結果】${playersData[msg.target]?.name} は ${msg.isWolf ? '人狼です' : '人狼ではありません'}。`;
                            msg.type = 'system';
                        }
                        if (msg.type === 'dead' && me.isAlive) return;
                        if (msg.type === 'werewolf' && (me.role !== 'werewolf' && me.isAlive)) return;
                        if (msg.type === 'public' && room.phase === 'night' && msg.senderId !== 'system' && me.isAlive) return; // public hidden at night except system/dead
                    }
                    
                    const div = document.createElement('div');
                    div.className = `msg ${msg.type}`;
                    const senderName = msg.senderId ? (playersData[msg.senderId]?.name || 'Unknown') : '';
                    div.innerHTML = msg.type === 'system' ? escapeHTML(msg.text) : `<b>${escapeHTML(senderName)}:</b> ${escapeHTML(msg.text)}`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
            unsubscribes.push(unsub);
        };

        const handleChatSubmit = async (e, mode) => {
            e.preventDefault();
            const input = document.getElementById(mode === 'waiting' ? 'waiting-chat-input' : 'game-chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            let type = 'public';
            if (mode === 'game') {
                if (!me.isAlive) type = 'dead';
                else if (room.phase === 'night' && me.role === 'werewolf') type = 'werewolf';
                else if (room.phase === 'night') return alert("夜はチャットできません（人狼以外）。");
            }

            await push(ref(db, `rooms/${room.id}/chats`), { senderId: me.id, text: text, type: type, timestamp: Date.now() });
        };
        document.getElementById('waiting-chat-form').addEventListener('submit', (e) => handleChatSubmit(e, 'waiting'));
        document.getElementById('game-chat-form').addEventListener('submit', (e) => handleChatSubmit(e, 'game'));


        // --- 11. Task System ---
        const generateTask = () => {
            const a = Math.floor(Math.random() * 50) + 1;
            const b = Math.floor(Math.random() * 50) + 1;
            currentTaskAnswer = (a + b).toString();
            
            document.getElementById('task-desc').innerText = `Calculate: ${a} + ${b} = ?`;
            const interactionArea = document.getElementById('task-interaction-area');
            interactionArea.innerHTML = `
                <div style="display:flex; gap:5px;">
                    <input type="text" id="task-input" placeholder="Answer" style="padding: 5px;">
                    <button class="btn-action" id="btn-task-submit">Submit</button>
                </div>
            `;
            
            document.getElementById('btn-task-submit').addEventListener('click', async () => {
                const val = document.getElementById('task-input').value.trim();
                if (val === currentTaskAnswer) {
                    // Task Complete
                    const currentCount = (tasksData[me.id]?.completedCount || 0) + 1;
                    const isUnlocked = currentCount >= 3;
                    await update(ref(db, `rooms/${room.id}/tasks/${me.id}`), {
                        completedCount: currentCount,
                        isHintUnlocked: isUnlocked
                    });
                    if (!isUnlocked) generateTask(); // Next task
                    else {
                        document.getElementById('task-desc').innerText = "Tasks Completed.";
                        interactionArea.innerHTML = '';
                    }
                } else {
                    document.getElementById('task-input').value = '';
                    document.getElementById('task-input').placeholder = 'Wrong!';
                }
            });
        };

        const generateRandomHint = () => {
            // Find a random alive villager/knight/seer and confirm they are NOT werewolf
            const aliveNotWolf = Object.entries(playersData).filter(([id, p]) => p.isAlive && p.role !== 'werewolf' && id !== me.id);
            if (aliveNotWolf.length > 0) {
                const randomGood = aliveNotWolf[Math.floor(Math.random() * aliveNotWolf.length)][1];
                return `【霊の囁き】 ${randomGood.name} からは人狼の気配を感じない...`;
            }
            return "【霊の囁き】 もうヒントはないようだ...";
        };

        // --- 12. Result Screen ---
        const showResultScreen = (winner) => {
            if(hostLoopInterval) clearInterval(hostLoopInterval);
            switchScreen('result');
            
            const title = document.getElementById('result-winner');
            if (winner === 'werewolf') {
                title.innerText = "WEREWOLVES WIN";
                title.className = 'win-text werewolf-win';
            } else {
                title.innerText = "VILLAGERS WIN";
                title.className = 'win-text';
            }

            const list = document.getElementById('result-player-list');
            list.innerHTML = '';
            Object.entries(playersData).forEach(([pid, p]) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <span style="${!p.isAlive ? 'text-decoration: line-through; opacity: 0.5' : ''}">${escapeHTML(p.name)}</span>
                    <span style="color: ${p.role === 'werewolf' || p.role === 'madman' ? 'var(--blood-red)' : 'var(--accent-cyan)'}">${ROLES[p.role]?.label}</span>
                `;
                list.appendChild(div);
            });
        };

        document.getElementById('btn-back-lobby').addEventListener('click', async () => {
            if(myDisconnectRef) myDisconnectRef.cancel();
            if (room.isHost) await remove(ref(db, `rooms/${room.id}`));
            clearListeners();
            switchScreen('lobby');
            subscribeLobby();
        });

        // --- Boot ---
        initUser();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube-Pro</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --text: #ffffff;
      --text-muted: #aaaaaa;
      --accent: #ff0000;
      --border: #303030;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto", Arial, sans-serif;
    }

    /* Header */
    header {
      position: fixed; top: 0; width: 100%; height: 56px;
      background: var(--bg); display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px; z-index: 1000;
      border-bottom: 1px solid #222;
    }
    .logo { font-size: 20px; font-weight: bold; text-decoration: none; color: white; display: flex; align-items: center; gap: 5px; }
    .logo span { color: var(--accent); font-size: 24px; }

    .search-area { flex: 0 1 720px; display: flex; position: relative; }
    .search-form { display: flex; width: 100%; background: #121212; border: 1px solid var(--border); border-radius: 40px; overflow: hidden; }
    .search-form input { flex: 1; background: transparent; border: none; color: white; height: 38px; padding: 0 16px; outline: none; font-size: 16px; }
    .search-form button { background: #222; border: none; border-left: 1px solid var(--border); color: white; padding: 0 20px; cursor: pointer; }

    /* Chips Navigation */
    .chips-bar {
      position: fixed; top: 56px; width: 100%; background: var(--bg);
      padding: 12px 16px; display: flex; gap: 12px; overflow-x: auto; z-index: 999;
      scrollbar-width: none; border-bottom: 1px solid #222;
    }
    .chip { background: rgba(255,255,255,0.1); padding: 6px 15px; border-radius: 8px; font-size: 14px; white-space: nowrap; cursor: pointer; transition: 0.2s; }
    .chip:hover { background: rgba(255,255,255,0.2); }
    .chip.active { background: white; color: black; }

    /* Video Grid */
    .container { margin-top: 130px; padding: 0 24px; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; row-gap: 32px; }

    .video-card { cursor: pointer; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
    .thumb { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 12px; overflow: hidden; margin-bottom: 12px; position: relative; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
    .video-card:hover .thumb img { transform: scale(1.03); }

    .meta { display: flex; gap: 12px; }
    .channel-avatar { width: 36px; height: 36px; border-radius: 50%; background: #333; flex-shrink: 0; }
    .details h3 { margin: 0; font-size: 16px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .details p { margin: 4px 0 0; font-size: 14px; color: var(--text-muted); }

    #loading { text-align: center; padding: 40px; color: var(--text-muted); font-weight: bold; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo"><span>●</span>YouTube Pro</a>
    <div class="search-area">
      <form id="searchForm" class="search-form">
        <input id="searchInput" type="text" placeholder="検索" autocomplete="off">
        <button type="submit">🔍</button>
      </form>
    </div>
    <div style="width:40px;"></div>
  </header>

  <div class="chips-bar">
    <div class="chip active" data-q="trending">すべて</div>
    <div class="chip" data-q="Music">音楽</div>
    <div class="chip" data-q="ゲーム実況">ゲーム</div>
    <div class="chip" data-q="ニュース ライブ">ニュース</div>
    <div class="chip" data-q="エンタメ">エンタメ</div>
    <div class="chip" data-q="最新テクノロジー">テック</div>
  </div>

  <div class="container">
    <div id="videoGrid" class="video-grid"></div>
    <div id="loading" style="display:none;">読み込み中...</div>
  </div>

  <script>
    const videoGrid = document.getElementById('videoGrid');
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const loading = document.getElementById('loading');

    let displayedIds = new Set();
    let isFetching = false;
    let currentPage = 0;
    let currentQuery = 'trending';

    async function loadContent(query = 'trending', page = 0) {
      if (isFetching) return;
      isFetching = true;
      loading.style.display = 'block';

      if (page === 0) {
        displayedIds.clear();
        videoGrid.innerHTML = '';
      }

      const isDefault = query === 'trending';
      const endpoint = isDefault 
        ? `/api/trending?page=${page}`
        : `/api/search?q=${encodeURIComponent(query)}&page=${page}`;

      try {
        const res = await fetch(endpoint);
        const data = await res.json();
        const items = data.items || [];

        if (items.length === 0 && page === 0) {
           videoGrid.innerHTML = '<p style="text-align:center; width:100%;">動画が見つかりませんでした。</p>';
        }

        items.forEach(item => {
          if (displayedIds.has(item.id)) return;
          displayedIds.add(item.id);

          const card = document.createElement('a');
          card.className = 'video-card';
          card.href = `/video/${item.id}`;
          card.innerHTML = `
            <div class="thumb">
              <img src="https://i3.ytimg.com/vi/${item.id}/mqdefault.jpg" loading="lazy">
            </div>
            <div class="meta">
              <div class="channel-avatar"></div>
              <div class="details">
                <h3>${item.title}</h3>
                <p>${item.channelTitle}</p>
                <p>${item.viewCountText || ''} • ${item.publishedTimeText || ''}</p>
              </div>
            </div>
          `;
          videoGrid.appendChild(card);
        });

      } catch (err) {
        console.error("Fetch error", err);
      } finally {
        isFetching = false;
        loading.style.display = 'none';
      }
    }

    searchForm.onsubmit = (e) => {
      e.preventDefault();
      const q = searchInput.value.trim();
      if (!q) return;
      currentQuery = q;
      currentPage = 0;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      history.pushState(null, '', `/search?q=${encodeURIComponent(q)}`);
      loadContent(q, 0);
    };

    window.onscroll = () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
        if (!isFetching) {
          currentPage++;
          loadContent(currentQuery, currentPage);
        }
      }
    };

    document.querySelector('.chips-bar').onclick = (e) => {
      if (e.target.classList.contains('chip')) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentQuery = e.target.dataset.q;
        currentPage = 0;
        searchInput.value = '';
        loadContent(currentQuery, 0);
      }
    };

    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) {
        currentQuery = q;
        searchInput.value = q;
        loadContent(q, 0);
      } else {
        loadContent('trending', 0);
      }
    };
  </script>
</body>
</html>

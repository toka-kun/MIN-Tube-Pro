<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube-Pro</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #0b0b0b;
      --card: #121212;
      --muted-card: #1a1a1a;
      --text: #ffffff;
      --text-muted: #bdbdbd;
      --accent: #ff0000;
      --border: #2b2b2b;
      --chip-bg: rgba(255,255,255,0.06);
      --chip-hover: rgba(255,255,255,0.12);
      --radius: 12px;
      --glass: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    }
    * { box-sizing: border-box; }
    html,body { height: 100%; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #070707 0%, #0f0f0f 100%);
      color: var(--text);
      font-family: "Roboto", "Noto Sans JP", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.4;
    }

    /* Header */
    header {
      position: fixed; top: 0; width: 100%; height: 64px;
      background: rgba(11,11,11,0.85); display: flex; align-items: center;
      justify-content: space-between; padding: 0 20px; z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      backdrop-filter: blur(6px);
    }
    .logo { font-size: 20px; font-weight: 700; text-decoration: none; color: white; display: flex; align-items: center; gap: 8px; }
    .logo span { color: var(--accent); font-size: 26px; line-height: 1; transform: translateY(-1px); }

    .search-area { flex: 0 1 720px; display: flex; position: relative; margin: 0 20px; }
    .search-form { display: flex; width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 40px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .search-form input { flex: 1; background: transparent; border: none; color: white; height: 42px; padding: 0 16px; outline: none; font-size: 15px; }
    .search-form button { background: rgba(255,255,255,0.03); border: none; border-left: 1px solid var(--border); color: white; padding: 0 18px; cursor: pointer; font-size: 16px; }

    /* Chips Navigation */
    .chips-bar {
      position: fixed; top: 64px; width: 100%; background: linear-gradient(180deg, rgba(11,11,11,0.9), rgba(11,11,11,0.85));
      padding: 12px 20px; display: flex; gap: 12px; overflow-x: auto; z-index: 999;
      scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .chips-bar::-webkit-scrollbar { display: none; }
    .chip { background: var(--chip-bg); padding: 8px 16px; border-radius: 999px; font-size: 14px; white-space: nowrap; cursor: pointer; transition: 0.18s ease; color: var(--text); border: 1px solid transparent; }
    .chip:hover { background: var(--chip-hover); transform: translateY(-2px); }
    .chip.active { background: white; color: black; box-shadow: 0 4px 14px rgba(0,0,0,0.6); }

    /* Container */
    .container { margin-top: 140px; padding: 0 28px 80px; max-width: 1400px; margin-left: auto; margin-right: auto; }

    /* Shorts Row */
    .shorts-section { margin-bottom: 22px; }
    .shorts-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
    .shorts-title { font-weight:700; font-size:18px; color:var(--text); display:flex; align-items:center; gap:10px; }
    .shorts-controls { display:flex; align-items:center; gap:8px; }
    .shorts-toggle {
      background: transparent; border: 1px solid rgba(255,255,255,0.06); color:var(--text); padding:6px 10px; border-radius:8px; cursor:pointer;
      font-weight:700; font-size:14px;
    }
    .shorts-row {
      display:flex; gap:12px; overflow-x:auto; padding-bottom:8px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent;
    }
    .shorts-row::-webkit-scrollbar { height:10px; }
    .shorts-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
    .short-card {
      min-width: 180px; max-width: 220px; background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: 12px; padding: 8px; cursor: pointer; text-decoration: none; color: inherit; display:flex; flex-direction:column; gap:8px;
      transition: transform .18s ease, box-shadow .18s ease;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .short-card:hover { transform: translateY(-6px); box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
    .short-thumb { width:100%; aspect-ratio: 9/16; border-radius: 10px; overflow:hidden; background:#111; position:relative; }
    .short-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .short-meta { display:flex; gap:10px; align-items:flex-start; }
    .short-meta .short-title { font-size:13px; font-weight:600; line-height:1.3; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .short-meta .short-channel { font-size:12px; color:var(--text-muted); }

    /* Video Grid */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; row-gap: 36px; align-items:start; }

    .video-card { cursor: pointer; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: transform .18s ease, box-shadow .18s ease; border-radius: 12px; }
    .video-card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.6); }
    .thumb { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 12px; overflow: hidden; margin-bottom: 12px; position: relative; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.35s cubic-bezier(.2,.8,.2,1); display:block; }
    .video-card:hover .thumb img { transform: scale(1.04); }

    .meta { display: flex; gap: 12px; align-items:flex-start; }
    .channel-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(180deg,#2b2b2b,#151515); flex-shrink: 0; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-weight:700; font-size:14px; }
    .details h3 { margin: 0; font-size: 15px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight:600; color:var(--text); }
    .details p { margin: 6px 0 0; font-size: 13px; color: var(--text-muted); }

    /* Loading / Empty */
    #loading { text-align: center; padding: 40px; color: var(--text-muted); font-weight: 700; }
    .empty { text-align:center; color:var(--text-muted); padding:40px 0; font-weight:600; }

    /* Responsive tweaks */
    @media (max-width: 900px) {
      .search-area { flex: 1 1 60%; }
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
      .short-card { min-width: 150px; }
    }
    @media (max-width: 520px) {
      header { padding: 0 12px; height: 56px; }
      .chips-bar { top: 56px; padding: 10px 12px; }
      .container { padding: 0 14px 80px; margin-top: 120px; }
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; row-gap: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo"><span>●</span>YouTube Pro</a>
    <div class="search-area">
      <form id="searchForm" class="search-form">
        <input id="searchInput" type="text" placeholder="検索" autocomplete="off">
        <button type="submit">🔍</button>
      </form>
    </div>
    <div style="width:40px;"></div>
  </header>

  <div class="chips-bar">
    <div class="chip active" data-q="trending">すべて</div>
    <div class="chip" data-q="Music">音楽</div>
    <div class="chip" data-q="ゲーム実況">ゲーム実況</div>
    <div class="chip" data-q="ゲーム">ゲーム</div>
    <div class="chip" data-q="エンタメ">エンタメ</div>
    <div class="chip" data-q="最新テクノロジー">テック</div>
  </div>

  <div class="container">
    <div id="shortsSection" class="shorts-section" style="display:none;">
      <div class="shorts-header">
        <div class="shorts-title">ショート動画</div>
        <div class="shorts-controls">
          <div style="color:var(--text-muted); font-size:13px;">横にスクロールして他のショートを表示</div>
          <button id="shortsToggle" class="shorts-toggle" aria-expanded="true">▼</button>
        </div>
      </div>
      <div id="shortsRow" class="shorts-row"></div>
    </div>

    <div id="videoGrid" class="video-grid"></div>
    <div id="loading" style="display:none;">読み込み中...</div>
  </div>

  <script>
    const videoGrid = document.getElementById('videoGrid');
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const loading = document.getElementById('loading');
    const shortsSection = document.getElementById('shortsSection');
    const shortsRow = document.getElementById('shortsRow');
    const shortsToggle = document.getElementById('shortsToggle');

    let displayedIds = new Set();
    let isFetching = false;
    let currentPage = 0;
    let currentQuery = 'trending';
    let shortsExpanded = true; // track toggle state

    // Utility: Fisher-Yates shuffle
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    async function fetchEndpoint(endpoint) {
      try {
        const res = await fetch(endpoint);
        if (!res.ok) return [];
        const data = await res.json();
        return data.items || [];
      } catch (err) {
        console.error("Fetch error", err);
        return [];
      }
    }

    // Normalize and filter a list of items: remove UC-starting ids and normalize id to string
    function normalizeAndFilterList(list) {
      const out = [];
      for (const it of list) {
        if (!it) continue;
        let id = null;
        if (typeof it.id === 'string') id = it.id;
        else if (it.id && typeof it.id === 'object') {
          id = it.id.videoId || it.id.channelId || it.id.playlistId || it.id;
        } else if (it.videoId) {
          id = it.videoId;
        }
        if (!id) continue;
        id = String(id);
        if (id.startsWith('UC')) continue; // exclude channel-like ids
        it.id = id;
        out.push(it);
      }
      return out;
    }

    // Toggle handler for shorts show/hide
    function updateShortsToggleUI() {
      if (!shortsSection || !shortsToggle || !shortsRow) return;
      if (!shortsSection.style.display || shortsSection.style.display === 'none') {
        // section hidden entirely
        shortsToggle.style.display = 'none';
        return;
      }
      shortsToggle.style.display = 'inline-block';
      if (shortsExpanded) {
        shortsToggle.textContent = '▼';
        shortsToggle.setAttribute('aria-expanded', 'true');
        shortsRow.style.display = 'flex';
      } else {
        shortsToggle.textContent = '▶';
        shortsToggle.setAttribute('aria-expanded', 'false');
        shortsRow.style.display = 'none';
      }
    }

    shortsToggle.addEventListener('click', () => {
      shortsExpanded = !shortsExpanded;
      updateShortsToggleUI();
    });

    async function loadContent(query = 'trending', page = 0) {
      if (isFetching) return;
      isFetching = true;
      loading.style.display = 'block';

      if (page === 0) {
        displayedIds.clear();
        videoGrid.innerHTML = '';
        // clear shorts area
        shortsRow.innerHTML = '';
        shortsSection.style.display = 'none';
        // reset expanded state to true when new results load (so users see shorts by default)
        shortsExpanded = true;
      }

      const isDefault = query === 'trending';
      const endpoint = isDefault 
        ? `/api/trending?page=${page}`
        : `/api/search?q=${encodeURIComponent(query)}&page=${page}`;

      try {
        // Primary fetch
        let items = await fetchEndpoint(endpoint);
        items = normalizeAndFilterList(items);

        // If first page and too few items, supplement with other categories and shuffle
        if (page === 0) {
          const MIN_ITEMS = 12; // 期待する最低表示数
          if (items.length < MIN_ITEMS) {
            // Collect other categories from chips
            const chips = Array.from(document.querySelectorAll('.chip'))
              .map(c => c.dataset.q)
              .filter(q => q && q !== query);

            // Shuffle categories to get varied content
            shuffleArray(chips);

            // Try fetching from up to 4 other categories (or fewer if not available)
            const supplementPromises = [];
            const maxSupplementSources = Math.min(4, chips.length);
            for (let i = 0; i < maxSupplementSources; i++) {
              const cat = chips[i];
              const catEndpoint = (cat === 'trending')
                ? `/api/trending?page=0`
                : `/api/search?q=${encodeURIComponent(cat)}&page=0`;
              supplementPromises.push(fetchEndpoint(catEndpoint));
            }

            const supplementResults = await Promise.all(supplementPromises);
            // Flatten and combine
            const combined = items.concat(...supplementResults.flat());

            // Filter out UC ids from combined and normalize
            const filteredCombined = normalizeAndFilterList(combined);

            // Deduplicate by id while preserving order
            const seen = new Set();
            const deduped = [];
            for (const it of filteredCombined) {
              if (!it || !it.id) continue;
              if (seen.has(it.id)) continue;
              seen.add(it.id);
              deduped.push(it);
            }

            // Shuffle the combined deduped list to mix categories
            items = shuffleArray(deduped);
          }
        }

        if (items.length === 0 && page === 0) {
           videoGrid.innerHTML = '<p class="empty">動画が見つかりませんでした。</p>';
        }

        // Separate shorts (title contains '#') and normal items
        let shorts = [];
        const normals = [];

        items.forEach(item => {
          if (!item || !item.id) return;
          const title = item.title || '';
          if (title.includes('#')) {
            shorts.push(item);
          } else {
            normals.push(item);
          }
        });

        // Ensure shorts correspond to the current search query when searching (not trending)
        // and when currentQuery is 'trending' allow shorts from trending.
        // If shorts are 4 or fewer on first page, do not display shorts section at all.
        if (page === 0) {
          // If user searched (currentQuery !== 'trending'), try to fetch more relevant shorts from same query pages first
          if (currentQuery !== 'trending' && shorts.length > 0 && shorts.length <= 4) {
            const needed = 6;
            const addedShortIds = new Set(shorts.map(s => s.id));
            const sameQueryPagesToTry = 3; // try pages 1..3
            for (let p = 1; p <= sameQueryPagesToTry && shorts.length < needed; p++) {
              const sameEndpoint = `/api/search?q=${encodeURIComponent(currentQuery)}&page=${p}`;
              try {
                const resItems = await fetchEndpoint(sameEndpoint);
                const norm = normalizeAndFilterList(resItems);
                for (const it of norm) {
                  if (!it || !it.id) continue;
                  if (addedShortIds.has(it.id)) continue;
                  if ((it.title || '').includes('#')) {
                    shorts.push(it);
                    addedShortIds.add(it.id);
                    if (shorts.length >= needed) break;
                  }
                }
              } catch (e) {
                console.error('Supplement same-query shorts fetch error', e);
              }
            }
          }

          // If still <=4 after trying to supplement from same query, do not show shorts at all.
          if (shorts.length <= 4) {
            // Do not display shorts section or toggle
            shortsSection.style.display = 'none';
          } else {
            // We have more than 4 shorts: show the section and render them.
            shortsSection.style.display = 'block';
            // Render each short horizontally; ensure no duplicates across pages
            shorts.forEach(item => {
              if (!item || !item.id) return;
              if (displayedIds.has(item.id)) return;
              displayedIds.add(item.id);

              const a = document.createElement('a');
              a.className = 'short-card';
              a.href = `/video/${item.id}`;
              const thumbUrl = `https://i3.ytimg.com/vi/${item.id}/hqdefault.jpg`;
              const channel = item.channelTitle || '';
              const viewText = item.viewCountText || '';
              a.innerHTML = `
                <div class="short-thumb">
                  <img src="${thumbUrl}" loading="lazy" alt="${(item.title||'ショート')}">
                </div>
                <div class="short-meta">
                  <div style="flex:1;">
                    <div class="short-title">${item.title || ''}</div>
                    <div class="short-channel">${channel} • ${viewText}</div>
                  </div>
                </div>
              `;
              shortsRow.appendChild(a);
            });
            // Ensure toggle UI reflects current expanded state
            updateShortsToggleUI();
          }
        } else {
          // For pages > 0, do not modify shorts section (shorts only shown on first page)
        }

        // Render normal videos (grid)
        normals.forEach(item => {
          if (!item || !item.id) return;
          if (displayedIds.has(item.id)) return;
          displayedIds.add(item.id);

          const card = document.createElement('a');
          card.className = 'video-card';
          card.href = `/video/${item.id}`;
          const thumbUrl = `https://i3.ytimg.com/vi/${item.id}/mqdefault.jpg`;
          const channel = item.channelTitle || '';
          const viewText = item.viewCountText || '';
          const published = item.publishedTimeText || '';
          card.innerHTML = `
            <div class="thumb">
              <img src="${thumbUrl}" loading="lazy" alt="${(item.title||'動画')}">
            </div>
            <div class="meta">
              <div class="channel-avatar">${(channel && channel[0]) ? channel[0].toUpperCase() : 'C'}</div>
              <div class="details">
                <h3>${item.title || ''}</h3>
                <p>${channel}</p>
                <p>${viewText} • ${published}</p>
              </div>
            </div>
          `;
          videoGrid.appendChild(card);
        });

      } catch (err) {
        console.error("Fetch error", err);
      } finally {
        isFetching = false;
        loading.style.display = 'none';
      }
    }

    searchForm.onsubmit = (e) => {
      e.preventDefault();
      const q = searchInput.value.trim();
      if (!q) return;
      currentQuery = q;
      currentPage = 0;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      history.pushState(null, '', `/search?q=${encodeURIComponent(q)}`);
      loadContent(q, 0);
    };

    window.onscroll = () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
        if (!isFetching) {
          currentPage++;
          loadContent(currentQuery, currentPage);
        }
      }
    };

    document.querySelector('.chips-bar').onclick = (e) => {
      if (e.target.classList.contains('chip')) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentQuery = e.target.dataset.q;
        currentPage = 0;
        searchInput.value = '';
        loadContent(currentQuery, 0);
      }
    };

    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) {
        currentQuery = q;
        searchInput.value = q;
        loadContent(q, 0);
      } else {
        loadContent('trending', 0);
      }
    };
  </script>
</body>
</html>
